<script>
        function selectTemplate(element, type) {
            // Reset all options
            const options = document.querySelectorAll('.template-option');
            options.forEach(opt => {
                // Reset to default inactive state classes
                opt.className = 'template-option group relative aspect-[3/4] border-2 border-outline/40 bg-surface-container-low hover:border-secondary hover:hard-shadow-secondary flex flex-col transition-all duration-200';
                
                // Hide checkmark
                const iconContainer = opt.querySelector('div.absolute');
                iconContainer.className = 'absolute top-2 right-2 opacity-0 group-hover:opacity-50 transition-opacity';
                
                // Reset bottom label bar
                const label = opt.querySelector('div.w-full.p-2');
                label.className = 'w-full p-2 border-t-2 border-outline/40 group-hover:border-secondary group-hover:bg-secondary/10 text-on-surface font-label-sm uppercase text-center transition-colors';
                
                // Specifically for Minimal hover fix
                if(opt.innerText.includes('VOID')) {
                    opt.className = opt.className.replace('hover:border-secondary hover:hard-shadow-secondary', 'hover:border-white hover:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]');
                    label.className = label.className.replace('group-hover:border-secondary group-hover:bg-secondary/10', 'group-hover:border-white group-hover:bg-white/10');
                }
                if(opt.innerText.includes('NEON_GRID')) {
                    opt.className = opt.className.replace('hover:border-secondary hover:hard-shadow-secondary', 'hover:border-primary hover:hard-shadow-primary');
                    label.className = label.className.replace('group-hover:border-secondary group-hover:bg-secondary/10', 'group-hover:border-primary group-hover:bg-primary/10');
                }
            });

            // Set active state on clicked element
            element.className = 'template-option group relative aspect-[3/4] border-2 border-tertiary-fixed bg-tertiary-container/10 hard-shadow-tertiary flex flex-col transition-all duration-200';
            
            const iconContainer = element.querySelector('div.absolute');
            iconContainer.className = 'absolute top-2 right-2 opacity-100 transition-opacity';
            iconContainer.innerHTML = '<span class="material-symbols-outlined text-tertiary-fixed" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
            
            const label = element.querySelector('div.w-full.p-2');
            label.className = 'w-full p-2 bg-tertiary-fixed border-t-2 border-tertiary-fixed text-on-tertiary-container font-label-sm uppercase text-center';

            // Update Preview Panel based on type
            const preview = document.getElementById('preview-strip');
            const images = preview.querySelectorAll('img');
            const acidOverlay = document.getElementById('acid-overlay');
            
            // Reset Preview
            preview.className = 'relative w-64 h-[400px] bg-white p-4 border-4 border-white hard-shadow-primary transition-all duration-300 transform rotate-[-2deg] hover:rotate-0';
            acidOverlay.classList.remove('opacity-100');
            acidOverlay.classList.add('opacity-0');
            images.forEach(img => img.className = 'w-full h-full object-cover filter grayscale sepia opacity-80 mix-blend-luminosity');

            if (type === 'acid') {
                preview.className = 'relative w-64 h-[400px] bg-tertiary-fixed p-4 border-4 border-black hard-shadow-secondary transition-all duration-300 transform rotate-[3deg] hover:rotate-0';
                acidOverlay.classList.remove('opacity-0');
                acidOverlay.classList.add('opacity-100');
                images.forEach(img => img.className = 'w-full h-full object-cover filter contrast-150 saturate-200');
            } else if (type === 'cyber') {
                preview.className = 'relative w-64 h-[400px] bg-surface-container-lowest p-4 border-2 border-primary-fixed hard-shadow-primary transition-all duration-300 transform rotate-0';
                images.forEach(img => img.className = 'w-full h-full object-cover filter hue-rotate-180 contrast-125');
            } else if (type === 'minimal') {
                preview.className = 'relative w-64 h-[400px] bg-black p-4 border border-outline transition-all duration-300 transform rotate-0';
                images.forEach(img => img.className = 'w-full h-full object-cover filter grayscale contrast-150');
            }
        }
    </script>
