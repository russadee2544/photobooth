<script>
    document.addEventListener("DOMContentLoaded", () => {
        const images = document.querySelectorAll('img.js-dither-target');
        
        images.forEach(img => {
            if (img.complete) {
                applyFloydSteinbergDither(img);
            } else {
                img.addEventListener('load', () => applyFloydSteinbergDither(img), { once: true });
            }
        });

        function applyFloydSteinbergDither(img) {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                
                canvas.width = img.naturalWidth || img.width || 300;
                canvas.height = img.naturalHeight || img.height || 400;
                
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const width = canvas.width;
                const height = canvas.height;
                
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const idx = (y * width + x) * 4;
                        
                        const r = data[idx];
                        const g = data[idx + 1];
                        const b = data[idx + 2];
                        
                        // Convert to grayscale
                        const oldPixel = (r * 0.299) + (g * 0.587) + (b * 0.114);
                        const newPixel = oldPixel < 128 ? 0 : 255;
                        
                        data[idx] = newPixel;
                        data[idx + 1] = newPixel;
                        data[idx + 2] = newPixel;
                        
                        const quantError = oldPixel - newPixel;
                        
                        if (x + 1 < width) addError(data, width, x + 1, y, quantError * 7 / 16);
                        if (x - 1 >= 0 && y + 1 < height) addError(data, width, x - 1, y + 1, quantError * 3 / 16);
                        if (y + 1 < height) addError(data, width, x, y + 1, quantError * 5 / 16);
                        if (x + 1 < width && y + 1 < height) addError(data, width, x + 1, y + 1, quantError * 1 / 16);
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                
                img.src = canvas.toDataURL();
                img.classList.remove('dither-effect-fallback');
                
            } catch (e) {
                console.error("Could not apply dithering due to CORS or image load error", e);
            }
        }

        function addError(data, width, x, y, err) {
            const idx = (y * width + x) * 4;
            data[idx] = Math.min(255, Math.max(0, data[idx] + err));
            data[idx+1] = Math.min(255, Math.max(0, data[idx+1] + err));
            data[idx+2] = Math.min(255, Math.max(0, data[idx+2] + err));
        }
    });
</script>
