<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PHOTO BOOTH — Home</title>
    <!-- Use Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        gray: {
                            900: '#0A0A0A',
                            500: '#676767',
                            400: '#8E8E8E',
                            100: '#E3E3E3',
                            50: '#F0F0F0',
                            0: '#FFFFFF'
                        },
                        accent: {
                            mint: '#BAFF66',
                            blue: '#4C65FF',
                            coral: '#FF6B57'
                        }
                    }, 
                    fontFamily: { 
                        sans: ['Inter', 'Prompt', 'sans-serif']
                    } 
                } 
            } 
        }
    </script>
    <link rel="stylesheet" href="shared.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen overflow-hidden relative flex flex-col bg-gradient-starter">
    
    <!-- Header -->
    <header class="kiosk-header">
        <div class="kiosk-brand tracking-widest text-sm cursor-pointer select-none" data-i18n="brand" onclick="handleSecretTap()">MEMORIES</div>
        <div class="flex gap-4">
            <button class="lang-btn text-sm transition-colors text-gray-400" data-lang="en" onclick="setLanguage('en')">EN</button>
            <span class="text-gray-300">|</span>
            <button class="lang-btn text-sm transition-colors text-gray-900 font-bold" data-lang="th" onclick="setLanguage('th')">TH</button>
        </div>
    </header>

    <!-- Animated Attract Background -->
    <div class="absolute inset-0 z-0 overflow-hidden opacity-30 pointer-events-none">
        <div class="absolute w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-accent-mint/20 via-transparent to-transparent animate-[pulse_8s_ease-in-out_infinite]"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-accent-blue/20 blur-[120px] rounded-full animate-[spin_12s_linear_infinite]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-accent-coral/20 blur-[120px] rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center relative z-10 p-4 sm:p-8" id="main-content">
        <div class="text-center fade-up-enter flex flex-col items-center">
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter text-gray-900 mb-4 md:mb-6 drop-shadow-sm uppercase">
                Memories
            </h1>
            <p class="text-base sm:text-xl md:text-2xl mb-8 md:mb-16 tracking-wide font-light max-w-lg mx-auto" data-i18n="home_subtitle">
                Premium digital photo booth experience.
            </p>

            <button onclick="startSession()" class="btn-modern btn-primary text-xl sm:text-2xl px-10 py-5 sm:px-16 sm:py-7 group animate-bounce rounded-full shadow-2xl" data-i18n="home_start">
                Tap to Start
                <span class="material-symbols-outlined ml-2 group-hover:translate-x-2 transition-transform text-2xl sm:text-3xl">east</span>
            </button>
        </div>
    </main>

    <!-- Admin PIN Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-gray-900/95 backdrop-blur-md z-[200] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4">
        <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-white tracking-widest uppercase">Admin Access</h2>
        <div class="flex gap-4 mb-6">
            <input type="password" id="admin-pin" class="bg-gray-800 border border-gray-600 rounded-lg text-white text-3xl sm:text-4xl text-center w-48 sm:w-64 h-16 sm:h-20 tracking-[1em]" placeholder="****" maxlength="4">
        </div>
        <div class="flex gap-4">
            <button onclick="hideAdminModal()" class="text-gray-400 hover:text-white px-6 py-3 font-medium">Cancel</button>
            <button onclick="submitAdminPin()" class="bg-white text-gray-900 px-8 py-3 rounded-md font-bold hover:bg-gray-200">Enter</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 w-full p-4 sm:p-8 flex justify-between z-50 text-[10px] sm:text-xs font-medium text-gray-400">
        <span id="footer-copyright-status" class="tracking-widest uppercase">© PHOTO BOOTH</span>
        <div class="flex gap-6">
            <a href="#" class="hover:text-gray-900 transition-colors">Privacy</a>
            <a href="#" class="hover:text-gray-900 transition-colors">Terms</a>
        </div>
    </footer>

    <script src="shared.js?v=2.4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new IdleTimer(60000, 'home.html').start(); // timeout to itself just to clear session
            Session.clear();
        });

        function startSession() {
            if (Kiosk.mode === 'event') {
                window.location.href = 'layout.html'; // Skip payment!
            } else {
                window.location.href = 'payment.html';
            }
        }

        // Phase 3: Secret Admin Trigger
        let tapCount = 0;
        let tapTimer = null;
        function handleSecretTap() {
            tapCount++;
            clearTimeout(tapTimer);
            if (tapCount >= 5) {
                tapCount = 0;
                showAdminModal();
            } else {
                tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
            }
        }

        function showAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100', 'pointer-events-auto');
            document.getElementById('admin-pin').value = '';
            setTimeout(() => document.getElementById('admin-pin').focus(), 100);
        }

        function hideAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.remove('opacity-100', 'pointer-events-auto');
            modal.classList.add('opacity-0', 'pointer-events-none');
        }

        function submitAdminPin() {
            const pin = document.getElementById('admin-pin').value;
            if (pin === '1234') {
                window.location.href = 'admin.html';
            } else {
                document.getElementById('admin-pin').classList.add('border-accent-coral', 'animate-pulse');
                setTimeout(() => document.getElementById('admin-pin').classList.remove('border-accent-coral', 'animate-pulse'), 1000);
            }
        }
    </script>
</body>
</html>
