<style>
        /* Grain overlay */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Scanline animation */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(51, 251, 10, 0.5), transparent);
            opacity: 0.4;
            animation: scanline 4s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        /* Glitch text effect */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-hover:hover {
            animation: glitch 0.2s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: theme('colors.secondary-container');
        }

        /* Progress Bar Animation */
        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 45%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }
        
        .progress-fill {
            animation: loadProgress 8s ease-in-out forwards;
        }

        /* Blinking cursor */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;

<script>
        // Simple script to cycle through text statuses and update percentage based on time
        document.addEventListener('DOMContentLoaded', () => {
            const statuses = [
                "DEVELOPING_FILM...",
                "APPLYING_DITHER_FILTER...",
                "RENDERING_Y2K_ASSETS...",
                "GENERATING_QR_CODE...",
                "FINALIZING_OUTPUT..."
            ];
            
            let statusIndex = 0;
            const statusElement = document.querySelector('.status-text');
            const percentDisplay = document.getElementById('percentage-display');
            
            // Total duration matches CSS animation (8s)
            const totalDuration = 8000; 
            const intervalTime = totalDuration / statuses.length;
            const startTime = Date.now();

            // Status Text Cycling
            const statusInterval = setInterval(() => {
                statusIndex++;
                if (statusIndex < statuses.length) {
                    statusElement.textContent = statuses[statusIndex];
                }
            }, intervalTime);

            // Percentage Update
            const percentInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                let percent = Math.min(100, Math.floor((elapsed / totalDuration) * 100));
                
                // Add some artificial non-linear scaling to match CSS easing visually
                if(percent > 30 && percent < 50) percent = Math.floor(percent * 1.1);
                if(percent > 100) percent = 100;

                percentDisplay.textContent = `${percent}%`;

                if (elapsed >= totalDuration) {
                    clearInterval(statusInterval);
                    clearInterval(percentInterval);
                    
                    // Simulate completion state
                    const currentStatusLine = document.getElementById('current-status');
                    currentStatusLine.classList.remove('text-primary-container');
                    currentStatusLine.classList.add('text-tertiary-fixed');
                    currentStatusLine.innerHTML = `
                        <span class="material-symbols-outlined text-[16px]">task_alt</span>
                        <span>PROCESSING_COMPLETE</span>
                    `;
                    
                    // Add a slight flash effect
                    document.body.style.filter = "invert(1)";
                    setTimeout(() => {
                        document.body.style.filter = "none";
                        // Normally would redirect to final print screen here
                    }, 150);
                }
            }, 50);
        });
    </script>
