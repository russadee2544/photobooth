<!-- Script for interaction -->
<script>
        function selectLayout(clickedCard) {
            // Remove selected class and reset shadows for all cards
            document.querySelectorAll('.layout-card').forEach(card => {
                card.classList.remove('selected');
                
                // Re-apply original shadows based on initial structure to maintain aesthetic variety when unselected
                if(card.querySelector('.text-primary')) {
                    card.classList.add('sticker-shadow-primary');
                } else if(card.querySelector('.text-secondary')) {
                    card.classList.add('sticker-shadow-secondary');
                } else {
                     // The 3-cut defaults to primary if unselected
                    card.classList.add('sticker-shadow-primary');
                }
                card.style.boxShadow = ''; // Clear inline styles
            });

            // Add selected class to clicked card
            clickedCard.classList.add('selected');
            
            // Remove specific colored shadows as .selected class handles the tertiary shadow
            clickedCard.classList.remove('sticker-shadow-primary', 'sticker-shadow-secondary');
        }
    </script>
